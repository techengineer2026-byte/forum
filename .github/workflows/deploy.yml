name: Deploy to Firebase
on:
  # Rebuilds every day at midnight (free cron job!)
  schedule:
    - cron: '0 0 * * *'
  # Also rebuilds when you push code
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' # Setup in Firebase CI
          projectId: forums-techengineer
          channelId: live